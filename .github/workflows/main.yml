name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Build deej (amd64)
        run: scripts/windows/build-all.bat
        shell: cmd

      - name: Rename binaries (amd64)
        run: |
          Rename-Item build/deej-release.exe deej-windows-amd64.exe
          Rename-Item build/deej-dev.exe deej-windows-amd64-dev.exe

      - name: Build deej (arm64)
        run: scripts/windows/build-all.bat
        shell: cmd
        env:
          GOARCH: arm64

      - name: Rename binaries (arm64)
        run: |
          Rename-Item build/deej-release.exe deej-windows-arm64.exe
          Rename-Item build/deej-dev.exe deej-windows-arm64-dev.exe

      # bundles both binaries into a single universal installer
      - name: Build installer
        run: ISCC /Obuild "/DAppVersion=$(git describe --tags --always)" /DAmd64Exe=../../build/deej-windows-amd64.exe /DArm64Exe=../../build/deej-windows-arm64.exe scripts/windows/installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deej-windows
          path: build/

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Build deej (amd64)
        run: scripts/linux/build-all.sh

      - name: Rename binaries (amd64)
        run: |
          mv build/deej-release build/deej-linux-amd64
          mv build/deej-dev build/deej-linux-amd64-dev

      - name: Build deej (arm64)
        run: scripts/linux/build-all.sh
        env:
          GOARCH: arm64

      - name: Rename binaries (arm64)
        run: |
          mv build/deej-release build/deej-linux-arm64
          mv build/deej-dev build/deej-linux-arm64-dev

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deej-linux
          path: build/

  release:
    name: Create release draft
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Architecture | Download |
            | --- | --- | --- |
            | Windows installer | amd64 + arm64 | [deej_setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej_setup.exe) |
            | Windows portable | amd64 | [deej-windows-amd64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-windows-amd64.exe) |
            | Windows portable | arm64 | [deej-windows-arm64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-windows-arm64.exe) |
            | Linux | amd64 | [deej-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-linux-amd64) |
            | Linux | arm64 | [deej-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-linux-arm64) |
          files: |
            artifacts/deej-windows-amd64.exe
            artifacts/deej-windows-arm64.exe
            artifacts/deej-linux-amd64
            artifacts/deej-linux-arm64
            artifacts/deej_setup.exe
