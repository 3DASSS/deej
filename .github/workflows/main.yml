name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      # the wails linux backend is cgo and needs GTK/WebKitGTK headers
      - name: Install GTK dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Run tests
        run: go test ./...

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # the build scripts delegate to the Task build system (Taskfile.yml)
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build deej (amd64)
        run: scripts/windows/build-all.bat
        shell: cmd

      - name: Rename binaries (amd64)
        run: |
          Rename-Item build/deej-release.exe deej-windows-amd64.exe
          Rename-Item build/deej-dev.exe deej-windows-amd64-dev.exe

      - name: Build deej (arm64)
        run: scripts/windows/build-all.bat
        shell: cmd
        env:
          GOARCH: arm64

      - name: Rename binaries (arm64)
        run: |
          Rename-Item build/deej-release.exe deej-windows-arm64.exe
          Rename-Item build/deej-dev.exe deej-windows-arm64-dev.exe

      # bundles both binaries into a single universal installer
      - name: Build installer
        run: ISCC /Obuild "/DAppVersion=$(git describe --tags --always)" /DAmd64Exe=../../build/deej-windows-amd64.exe /DArm64Exe=../../build/deej-windows-arm64.exe scripts/windows/installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deej-windows
          path: build/

  # linux builds are cgo (wails GTK backend), so each architecture builds
  # natively on a matching runner instead of cross-compiling
  build-linux:
    name: Build (linux ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      # the build scripts delegate to the Task build system (Taskfile.yml)
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build deej
        run: scripts/linux/build-all.sh

      - name: Rename binaries
        run: |
          mv build/deej-release build/deej-linux-${{ matrix.arch }}
          mv build/deej-dev build/deej-linux-${{ matrix.arch }}-dev

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deej-linux-${{ matrix.arch }}
          path: build/

  release:
    name: Create release draft
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Architecture | Download |
            | --- | --- | --- |
            | Windows installer | amd64 + arm64 | [deej_setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej_setup.exe) |
            | Windows portable | amd64 | [deej-windows-amd64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-windows-amd64.exe) |
            | Windows portable | arm64 | [deej-windows-arm64.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-windows-arm64.exe) |
            | Linux | amd64 | [deej-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-linux-amd64) |
            | Linux | arm64 | [deej-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deej-linux-arm64) |
          files: |
            artifacts/deej-windows-amd64.exe
            artifacts/deej-windows-arm64.exe
            artifacts/deej-linux-amd64
            artifacts/deej-linux-arm64
            artifacts/deej_setup.exe
